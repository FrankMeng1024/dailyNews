version: '3.8'

services:
  backend:
    build: ../backend
    container_name: ainews-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://ainews:ainews123@db:3306/ainews
      - GLM_API_KEY=${GLM_API_KEY}
      - GLM_API_URL=https://open.bigmodel.cn/api/paas/v4/chat/completions
      - GLM_TTS_URL=https://open.bigmodel.cn/api/paas/v4/audio/speech
      - GLM_MODEL=glm-4
      - NEWS_API_KEY=${NEWS_API_KEY}
      - NEWS_API_URL=https://newsapi.org/v2
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}
      - TIMEZONE=Asia/Shanghai
      - DEBUG=false
    volumes:
      - audio_storage:/app/storage/audio
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ainews-network

  db:
    image: mysql:8.0
    container_name: ainews-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass123
      - MYSQL_DATABASE=ainews
      - MYSQL_USER=ainews
      - MYSQL_PASSWORD=ainews123
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ainews-network

volumes:
  mysql_data:
    driver: local
  audio_storage:
    driver: local

networks:
  ainews-network:
    driver: bridge
